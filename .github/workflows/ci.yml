name: CI

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  actions: read
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
          # Use fetch-depth: 0 to get full history, but don't use --unshallow
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun lint

      - name: Type check
        run: bun typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
          name: build-artifacts
          path: |
            apps/*/dist
            packages/*/dist
          retention-days: 7
